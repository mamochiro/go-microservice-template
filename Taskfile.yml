version: '3'

vars:
  APP_NAME: go-microservice-template
  MAIN_PATH: cmd/api/main.go
  BIN_PATH: bin/{{.APP_NAME}}

tasks:
  install-deps:
    desc: Install development dependencies
    cmds:
      - go install github.com/google/wire/cmd/wire@latest
      - go install github.com/vektra/mockery/v2@latest
      - go install github.com/swaggo/swag/cmd/swag@latest
      - go install github.com/air-verse/air@latest
      - go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5
      - go mod download
      - cd web && bun install

  setup:
    desc: Initial project setup (env, dependencies, infrastructure, and test db)
    cmds:
      - test -f .env || cp .env.example .env
      - task: install-deps
      - task: docker-up
      - echo "Waiting for database to be ready..."
      - sleep 5
      - docker exec go-microservice-template-postgres-1 psql -U user -d postgres -c "CREATE DATABASE microservice_test;" || true
      - task: migrate-up
      - task: gen
      - task: build
    silent: false

  build:
    desc: Build the application (API and Web)
    cmds:
      - task: build-api
      - task: build-web

  build-api:
    desc: Build the Go API
    cmds:
      - go build -o {{.BIN_PATH}} {{.MAIN_PATH}}

  build-web:
    desc: Build the React frontend
    cmds:
      - cd web && bun run build

  run:
    desc: Run the Go API
    cmds:
      - go run {{.MAIN_PATH}}

  wire:
    desc: Generate dependency injection code
    cmds:
      - cd internal/app && $(go env GOPATH)/bin/wire

  mock:
    desc: Generate mocks
    cmds:
      - $(go env GOPATH)/bin/mockery

  swagger:
    desc: Generate swagger documentation
    cmds:
      - $(go env GOPATH)/bin/swag init -g {{.MAIN_PATH}}

  gen:
    desc: Run all generation tasks (Wire, Mock, Swagger)
    cmds:
      - task: wire
      - task: mock
      - task: swagger

  lint:
    desc: Run linters (API and Web)
    cmds:
      - task: lint-api
      - task: lint-web

  lint-api:
    desc: Run golangci-lint
    cmds:
      - $(go env GOPATH)/bin/golangci-lint run ./...

  lint-web:
    desc: Run eslint for web
    cmds:
      - cd web && bun run lint

  test:
    desc: Run all tests (API and Web)
    cmds:
      - task: test-api
      - task: test-web

  test-api:
    desc: Run Go unit tests
    cmds:
      - go test -v ./...

  test-web:
    desc: Run web tests (if any)
    cmds:
      - cd web && bun test

  integration-test:
    desc: Run integration tests
    cmds:
      - POSTGRES_DBNAME=microservice_test go test -v -tags=integration ./tests/integration/...

  docker-up:
    desc: Start docker-compose
    cmds:
      - docker-compose up -d

  docker-down:
    desc: Stop docker-compose
    cmds:
      - docker-compose down

  image-build:
    desc: Build Docker image locally
    cmds:
      - docker build -t {{.APP_NAME}}:latest .

  image-push:
    desc: Push Docker image to GHCR (requires being logged in)
    vars:
      IMAGE: ghcr.io/{{.GITHUB_USER | default "mamochiro"}}/{{.APP_NAME}}
    cmds:
      - docker tag {{.APP_NAME}}:latest {{.IMAGE}}:latest
      - docker push {{.IMAGE}}:latest

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  dev:
    desc: Run both API and Web in development mode
    cmds:
      - task: dev-api
      - task: dev-web

  dev-api:
    desc: Run API with live reloading (Air)
    cmds:
      - $(go env GOPATH)/bin/air

  dev-web:
    desc: Run Web frontend with Vite
    cmds:
      - cd web && bun run dev

  migrate-new:
    desc: Create a new migration
    cmds:
      - $(go env GOPATH)/bin/migrate create -ext sql -dir migrations -seq {{.CLI_ARGS}}

  migrate-up:
    desc: Run migrations up
    cmds:
      - $(go env GOPATH)/bin/migrate -path migrations -database "postgres://user:password@localhost:5434/microservice?sslmode=disable" up

  migrate-down:
    desc: Rollback migrations
    cmds:
      - $(go env GOPATH)/bin/migrate -path migrations -database "postgres://user:password@localhost:5434/microservice?sslmode=disable" down 1
