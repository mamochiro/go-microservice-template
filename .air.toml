# Config file for [Air](https://github.com/air-verse/air) in TOML format

root = "."
tmp_dir = "bin"

[build]
  cmd = "go build -o ./bin/api cmd/api/main.go"
  bin = "./bin/api"
  delay = 1000
  exclude_dir = ["bin", "vendor", "tests", "docs", "mocks", ".git"]
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "env"]
  exclude_regex = ["_test.go"]
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[screen]
  clear_on_rebuild = true
